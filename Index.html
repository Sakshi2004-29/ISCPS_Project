<!DOCTYPE html>
<html>
<head>
<title>IDS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f7fb, #eef2ff);
    color: #1f2937;
}

/* ===== LAYOUT ===== */
.container {
    display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #e0e7ff, #c7d2fe);
    color: #374151;
    padding: 20px;
    box-shadow: 4px 0 20px rgba(0,0,0,0.05);
}

.sidebar h3 {
    margin-bottom: 30px;
    color: #4f46e5;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    padding: 25px;
}

/* ===== GRID ===== */
.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
}

/* ===== CARD ===== */
.card {
    background: rgba(255,255,255,0.9);
    padding: 22px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-4px);
}

/* ===== PINK INPUT CARD ===== */
.input-card {
    background: linear-gradient(135deg, #fdf2f8, #fce7f3);
    border: 1px solid #fbcfe8;
}

/* ===== STATS ===== */
.stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
}

.stat-purple {
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    color: white;
}

.stat-red {
    background: linear-gradient(135deg, #f43f5e, #fb7185);
    color: white;
}

.stat-green {
    background: linear-gradient(135deg, #10b981, #34d399);
    color: white;
}

.stat-box {
    padding: 18px;
    border-radius: 16px;
}

/* ===== INPUT ===== */
input {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    width: 220px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #ec4899;
    box-shadow: 0 0 8px rgba(236,72,153,0.4);
}

/* ===== BUTTON ===== */
button {
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
    cursor: pointer;
    margin: 5px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* CLEAR BUTTON */
.clear-btn {
    background: linear-gradient(135deg, #64748b, #94a3b8);
}

/* ===== RIGHT PANEL ===== */
.right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ===== STATUS ===== */
.status {
    margin-top: 10px;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>🚨 IDS</h3>
<p>Dashboard</p>
<p>Logs</p>
</div>

<div class="main">

<h2>Intrusion Detection System</h2>

<div class="dashboard">

<!-- LEFT -->
<div>

<div class="stats">
<div class="stat-box stat-purple">
<p>Total</p><h2 id="total">0</h2>
</div>

<div class="stat-box stat-red">
<p>Threats</p><h2 id="attacks">0</h2>
</div>

<div class="stat-box stat-green">
<p>Rate</p><h2 id="rate">0%</h2>
</div>
</div>

<br>

<div class="card input-card">
<h3>Input</h3>

<input type="number" id="value" placeholder="Enter value"><br>

<button onclick="checkData()">Analyze</button>
<button onclick="clearAll()" class="clear-btn">Clear All</button>

<br><br>

<input type="file" id="csvFile" accept=".csv">
<button onclick="uploadCSV()">Upload CSV</button>

<div id="result" class="status"></div>

</div>

<br>

<div class="card">
<h3>Graph</h3>
<canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="card">
<h3>Info</h3>
<p>Range: 15 - 35</p>
</div>

<div class="card">
<h3>Ratio</h3>
<canvas id="circleChart"></canvas>
</div>

<div class="card">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

</div>

</div>

</div>

</div>

<script>

let total = 0;
let attacks = 0;

let chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: [],
        datasets: [{
            data: [],
            backgroundColor: []
        }]
    }
});

let circleChart = new Chart(document.getElementById("circleChart"), {
    type: "doughnut",
    data: {
        labels:["Safe","Threat"],
        datasets:[{
            data:[1,0],
            backgroundColor:["#22c55e","#ef4444"]
        }]
    }
});

function processValue(value) {

    total++;

    let color;

    if (value < 15 || value > 35) {
        attacks++;
        result.innerHTML = "🚨 Threat Detected";
        result.style.color = "red";
        color = "#ef4444";
    } else {
        result.innerHTML = "✅ Safe";
        result.style.color = "green";
        color = "#22c55e";
    }

    document.getElementById("total").innerText = total;
    document.getElementById("attacks").innerText = attacks;

    let rate = ((attacks/total)*100).toFixed(1);
    document.getElementById("rate").innerText = rate + "%";

    chart.data.labels.push("T"+total);
    chart.data.datasets[0].data.push(value);
    chart.data.datasets[0].backgroundColor.push(color);
    chart.update();

    circleChart.data.datasets[0].data = [total-attacks, attacks];
    circleChart.update();

    let li = document.createElement("li");
    li.innerText = value;
    document.getElementById("historyList").appendChild(li);
}

function checkData() {
    let value = parseInt(document.getElementById("value").value);
    if (!isNaN(value)) processValue(value);
}

function uploadCSV() {
    let file = document.getElementById("csvFile").files[0];
    if (!file) return alert("Select CSV file");

    let reader = new FileReader();

    reader.onload = function(e) {
        let lines = e.target.result.split("\n");
        lines.forEach(line => {
            let value = parseInt(line.trim());
            if (!isNaN(value)) processValue(value);
        });
    };

    reader.readAsText(file);
}

function clearAll() {

    total = 0;
    attacks = 0;

    document.getElementById("total").innerText = 0;
    document.getElementById("attacks").innerText = 0;
    document.getElementById("rate").innerText = "0%";

    document.getElementById("value").value = "";
    document.getElementById("result").innerHTML = "";

    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.data.datasets[0].backgroundColor = [];
    chart.update();

    circleChart.data.datasets[0].data = [1, 0];
    circleChart.update();

    document.getElementById("historyList").innerHTML = "";
}

</script>

</body>
</html>
